<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>앱 아이콘 변환기</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <h1>🌙 앱 아이콘 변환기</h1>
  <p class="subtitle">몽글 앱 아이콘을 스토어 규격에 맞게 변환합니다</p>

  <div class="spec-box">
    <h3>📋 출력 설정</h3>
    <div class="size-options">
      <div class="preset-label">빠른 선택</div>
      <div class="presets">
        <button class="preset-btn active" onclick="setSize(512, this)">512×512</button>
        <button class="preset-btn" onclick="setSize(1024, this)">1024×1024</button>
        <button class="preset-btn" onclick="setSize(256, this)">256×256</button>
        <button class="preset-btn" onclick="setSize(192, this)">192×192</button>
        <button class="preset-btn" onclick="setSize(180, this)">180×180</button>
        <button class="preset-btn" onclick="setSize(96, this)">96×96</button>
      </div>
      <div class="custom-size-row">
        <span class="preset-label">직접 입력</span>
        <div class="custom-inputs">
          <input type="number" id="customW" placeholder="가로" min="16" max="4096" oninput="onCustomInput()">
          <span class="x-label">×</span>
          <input type="number" id="customH" placeholder="세로" min="16" max="4096" oninput="onCustomInput()">
          <span class="px-label">px</span>
          <button class="apply-btn" id="applyBtn" onclick="applyCustomSize()" disabled>적용</button>
        </div>
      </div>
      <div class="current-size-info">현재 출력 크기: <strong id="currentSizeLabel">512 × 512 px</strong></div>
    </div>
  </div>

  <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
    <div class="icon">🖼️</div>
    <p>이미지를 여기에 드래그하거나 클릭하여 업로드</p>
    <p style="font-size:12px; margin-top:4px;">PNG, JPEG, WEBP 지원</p>
  </div>
  <input type="file" id="fileInput" accept="image/*">

  <div class="info-bar" id="infoBar"></div>

  <div class="preview-area" id="previewArea">
    <div class="preview-box">
      <label>원본 이미지</label>
      <img id="originalPreview" style="max-height:200px;">
    </div>
    <div class="preview-box">
      <label id="resultLabel">변환 결과 (512×512, 투명 배경)</label>
      <div class="checker">
        <canvas id="resultCanvas" width="200" height="200"></canvas>
      </div>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-secondary" onclick="reset()">초기화</button>
    <button class="btn btn-primary" id="downloadBtn" disabled onclick="download()">
      📥 PNG 다운로드 (512×512)
    </button>
  </div>
</div>
<script src="main.js"></script>
</body>
</html>
